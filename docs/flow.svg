<svg xmlns="http://www.w3.org/2000/svg" width="820" height="300" viewBox="0 0 820 300" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#ffd54f"/>
    </marker>
    <marker id="arrowb" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8fb4d6"/>
    </marker>
  </defs>

  <rect width="820" height="300" fill="#1c1b19"/>

  <!-- Node 1: Browser -->
  <rect x="24" y="96" width="168" height="108" rx="10" fill="#26241f" stroke="#3a352d"/>
  <text x="108" y="128" font-size="15" fill="#e8e2d6" font-weight="600" text-anchor="middle">Browser board</text>
  <text x="108" y="150" font-size="11.5" fill="#9a948a" text-anchor="middle">web/ · vanilla JS</text>
  <text x="108" y="170" font-size="11.5" fill="#9a948a" text-anchor="middle">you drag a piece</text>
  <text x="108" y="188" font-size="11.5" fill="#9a948a" text-anchor="middle">live via SSE</text>

  <!-- Node 2: Server (referee) -->
  <rect x="326" y="84" width="168" height="132" rx="10" fill="#26241f" stroke="#ffd54f" stroke-opacity="0.5"/>
  <text x="410" y="116" font-size="15" fill="#e8e2d6" font-weight="600" text-anchor="middle">Node server</text>
  <text x="410" y="137" font-size="11.5" fill="#ffd54f" text-anchor="middle" opacity="0.85">the referee</text>
  <text x="410" y="159" font-size="11.5" fill="#9a948a" text-anchor="middle">validates every move</text>
  <text x="410" y="177" font-size="11.5" fill="#9a948a" text-anchor="middle">with chess.js</text>
  <text x="410" y="199" font-size="11.5" fill="#9a948a" text-anchor="middle">saves + broadcasts</text>

  <!-- Node 3: Claude -->
  <rect x="628" y="96" width="168" height="108" rx="10" fill="#26241f" stroke="#3a352d"/>
  <text x="712" y="128" font-size="15" fill="#e8e2d6" font-weight="600" text-anchor="middle">Claude Code</text>
  <text x="712" y="150" font-size="11.5" fill="#9a948a" text-anchor="middle">in a tmux pane</text>
  <text x="712" y="170" font-size="11.5" fill="#9a948a" text-anchor="middle">reads the prompt,</text>
  <text x="712" y="188" font-size="11.5" fill="#9a948a" text-anchor="middle">picks a reply</text>

  <!-- Forward path: Browser -> Server -->
  <line x1="192" y1="132" x2="326" y2="132" stroke="#ffd54f" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="259" y="122" font-size="11" fill="#c9b98f" text-anchor="middle" font-weight="600">POST</text>
  <text x="259" y="146" font-size="10.5" fill="#8b857b" text-anchor="middle">/api/move</text>

  <!-- Forward path: Server -> Claude -->
  <line x1="494" y1="132" x2="628" y2="132" stroke="#ffd54f" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="561" y="122" font-size="11" fill="#c9b98f" text-anchor="middle" font-weight="600">tmux send-keys</text>
  <text x="561" y="146" font-size="10.5" fill="#8b857b" text-anchor="middle">move + FEN + cmd</text>

  <!-- Return path: Claude -> Server -->
  <line x1="628" y1="176" x2="494" y2="176" stroke="#8fb4d6" stroke-width="2" marker-end="url(#arrowb)"/>
  <text x="561" y="196" font-size="11" fill="#8fb4d6" text-anchor="middle" font-weight="600">claude.mjs move</text>

  <!-- Return path: Server -> Browser -->
  <line x1="326" y1="176" x2="192" y2="176" stroke="#8fb4d6" stroke-width="2" marker-end="url(#arrowb)"/>
  <text x="259" y="196" font-size="11" fill="#8fb4d6" text-anchor="middle" font-weight="600">SSE update</text>

  <!-- Title + caption -->
  <text x="410" y="42" font-size="16" fill="#e8e2d6" font-weight="600" text-anchor="middle">One move, end to end</text>
  <text x="410" y="64" font-size="12" fill="#9a948a" text-anchor="middle">Gold = your move travelling out · Blue = Claude's reply coming back</text>

  <text x="410" y="278" font-size="11.5" fill="#8b857b" text-anchor="middle">The server is the single source of truth — the browser and Claude are never trusted to referee themselves.</text>
</svg>
